version: '3.8'

services:
  app:
    image: ${DOCKER_REGISTRY:-myregistry.com}/agente-atendimento:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3020
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-@M3ub4nc0p0stgr3s}@agent_postgres:5432/${POSTGRES_DB:-multi_atendimento}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2}
      - OPENAI_MODEL_MINI=${OPENAI_MODEL_MINI:-gpt-4.1-mini}
      - CHATWOOT_BASE_URL=${CHATWOOT_BASE_URL}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID:-1}
      - CHATWOOT_ALERT_INBOX_ID=${CHATWOOT_ALERT_INBOX_ID:-1}
      - CHATWOOT_ALERT_CONVERSATION_ID=${CHATWOOT_ALERT_CONVERSATION_ID:-1}
      - GOOGLE_CALENDAR_CREDENTIALS=${GOOGLE_CALENDAR_CREDENTIALS}
      - PROFISSIONAIS_CALENDAR_IDS=${PROFISSIONAIS_CALENDAR_IDS}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - TZ=${TZ:-America/Sao_Paulo}
      - DEBOUNCE_DELAY_MS=${DEBOUNCE_DELAY_MS:-16000}
      - LOCK_MAX_RETRIES=${LOCK_MAX_RETRIES:-5}
      - LOCK_RETRY_DELAY_MS=${LOCK_RETRY_DELAY_MS:-3000}
      - NOME_NEGOCIO=${NOME_NEGOCIO}
      - NOME_ASSISTENTE=${NOME_ASSISTENTE}
      - RAMO_NEGOCIO=${RAMO_NEGOCIO}
      - HORARIO_FUNCIONAMENTO=${HORARIO_FUNCIONAMENTO}
      - ENDERECO=${ENDERECO}
      - TELEFONE=${TELEFONE}
      - FORMAS_PAGAMENTO=${FORMAS_PAGAMENTO}
      - CONVENIOS=${CONVENIOS}
      - PROFISSIONAIS=${PROFISSIONAIS}
      - PROCEDIMENTOS=${PROCEDIMENTOS}
    ports:
      - target: 3020
        published: 3020
        protocol: tcp
        mode: ingress
    networks:
      - agent_network
    depends_on:
      - agent_postgres
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  agent_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-@M3ub4nc0p0stgr3s}
      POSTGRES_DB: ${POSTGRES_DB:-multi_atendimento}
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data
    networks:
      - agent_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-multi_atendimento}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  agent_network:
    driver: overlay
    attachable: true

volumes:
  agent_postgres_data:
    driver: local
